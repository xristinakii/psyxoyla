<style>
html,body{
    margin:0;
    padding:0;
    background: ;
}

/* CONTENITORI VIDEO */
.video-box{
    position:fixed;
    width:240px;
    height:520px;
    top:50%;
    transform:translateY(-50%);
    border-radius:14px;
    border:2px solid #281af9;
    box-shadow:0 0 20px #281af9,0 0 40px #281af9;
    overflow:hidden;
    z-index:9999;
}

/* POSIZIONE */
.video-left{left:10px;}
.video-right{right:10px;}

/* VIDEO */
.video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* TESTO */
.video-text{
    position:absolute;
    bottom:8px;
    left:0;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    text-shadow:0 0 8px #fff,0 0 15px #ffffff;
    pointer-events:none;
    animation:wave 3s ease-in-out infinite;
}

/* ANIMAZIONE ONDA */
@keyframes wave{
    0%{transform:translateY(0) rotate(0deg);}
    25%{transform:translateY(-4px) rotate(-1deg);}
    50%{transform:translateY(0) rotate(0deg);}
    75%{transform:translateY(4px) rotate(1deg);}
    100%{transform:translateY(0) rotate(0deg);}
}
</style>
</head>

<body>

<!-- VIDEO SINISTRO -->
<div class="video-box video-left">
    <video autoplay="" loop="" muted="" playsinline="">

<script>


		var message="no copy christina!";

		function clickIE4(){
		if (event.button==2){
		alert(message);
		return false;
		}
		}

		function clickNS4(e){
		if (document.layers||document.getElementById&&!document.all){
		if (e.which==2||e.which==3){
		alert(message);
		return false;
		}
		}
		}

		if (document.layers){
		document.captureEvents(Event.MOUSEDOWN);
		document.onmousedown=clickNS4;
		}
		else if (document.all&&!document.getElementById){
		document.onmousedown=clickIE4;
		}

		document.oncontextmenu=new Function("alert(message);return false")
</script>
